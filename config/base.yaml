app:
  name: nexus-rag-platform
  version: 0.1.0
  env: development
  host: 0.0.0.0
  port: 8000

logging:
  level: INFO
  json_logs: true

openai:
  api_key: ""
  model: gpt-4.1-mini
  timeout_seconds: 10.0

ingestion:
  input_dir: data/raw
  output_dir: data/processed
  default_strategy: structure_aware
  chunk_size: 900
  chunk_overlap: 150
  semantic_similarity_threshold: 0.18

indexing:
  input_chunk_file: data/processed/chunks.jsonl
  output_dir: data/indexes
  embedding_provider: sentence_transformers
  embedding_fallback_provider: hash
  embedding_model_name: BAAI/bge-small-en-v1.5
  embedding_dimensions: 384
  embedding_batch_size: 16
  embedding_version: v1
  dense_backend: faiss
  dense_fallback_backend: native
  dense_index_type: hnsw
  dense_hnsw_m: 32
  dense_hnsw_ef_construction: 80
  sparse_backend: whoosh
  sparse_fallback_backend: native
  bm25_k1: 1.5
  bm25_b: 0.75

query:
  enable_expansion: true
  expansion_terms_per_token: 3
  enable_rule_rewrite: true
  enable_llm_fallback: true
  llm_fallback_min_tokens: 4
  max_expanded_terms: 12
  preserve_original_case: false

retrieval:
  manifest_path: data/indexes/v1/manifest.json
  dense_top_k: 8
  sparse_top_k: 8
  fused_top_k: 10
  candidate_pool_size: 12
  rrf_k: 60
