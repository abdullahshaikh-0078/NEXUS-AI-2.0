apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-rag-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-rag-api
  template:
    metadata:
      labels:
        app: nexus-rag-api
    spec:
      containers:
        - name: rag-api
          image: nexus-rag-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: RAG_APP__ENV
              value: production
            - name: RAG_APP__HOST
              value: 0.0.0.0
            - name: RAG_APP__PORT
              value: "8000"
            - name: RAG_CACHE__PROVIDER
              value: redis
            - name: RAG_CACHE__REDIS_URL
              value: redis://nexus-rag-redis:6379/0
            - name: RAG_SCALING__MAX_CONCURRENT_QUERIES
              value: "16"
            - name: RAG_SCALING__WORKER_PROCESSES
              value: "2"
            - name: RAG_RESILIENCE__ALLOW_PARTIAL_RETRIEVAL
              value: "true"
            - name: RAG_SECURITY__PROMPT_INJECTION_ACTION
              value: sanitize
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-rag-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus-rag-redis
  template:
    metadata:
      labels:
        app: nexus-rag-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
