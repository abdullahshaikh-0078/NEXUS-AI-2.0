app:
  name: nexus-rag-platform
  version: 0.1.0
  env: development
  host: 0.0.0.0
  port: 8000

logging:
  level: INFO
  json_logs: true

openai:
  api_key: ""

ingestion:
  input_dir: data/raw
  output_dir: data/processed
  default_strategy: structure_aware
  chunk_size: 900
  chunk_overlap: 150
  semantic_similarity_threshold: 0.18
