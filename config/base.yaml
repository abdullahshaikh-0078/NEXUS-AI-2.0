app:
  name: nexus-rag-platform
  version: 0.15.0
  env: development
  host: 0.0.0.0
  port: 8000

api:
  prefix: /api/v1
  cors_origins:
    - "*"
  request_timeout_seconds: 30.0

logging:
  level: INFO
  json_logs: true

openai:
  api_key: ""
  model: gpt-4.1-mini
  timeout_seconds: 10.0

ingestion:
  input_dir: data/raw
  output_dir: data/processed
  default_strategy: structure_aware
  chunk_size: 900
  chunk_overlap: 150
  semantic_similarity_threshold: 0.18

indexing:
  input_chunk_file: data/processed/chunks.jsonl
  output_dir: data/indexes
  embedding_provider: sentence_transformers
  embedding_fallback_provider: hash
  embedding_model_name: BAAI/bge-small-en-v1.5
  embedding_dimensions: 384
  embedding_batch_size: 16
  embedding_version: v1
  dense_backend: faiss
  dense_fallback_backend: native
  dense_index_type: hnsw
  dense_hnsw_m: 32
  dense_hnsw_ef_construction: 80
  sparse_backend: whoosh
  sparse_fallback_backend: native
  bm25_k1: 1.5
  bm25_b: 0.75

query:
  enable_expansion: true
  expansion_terms_per_token: 3
  enable_rule_rewrite: true
  enable_llm_fallback: true
  llm_fallback_min_tokens: 4
  max_expanded_terms: 12
  preserve_original_case: false

retrieval:
  manifest_path: data/indexes/v1/manifest.json
  dense_top_k: 8
  sparse_top_k: 8
  fused_top_k: 10
  candidate_pool_size: 12
  rrf_k: 60

reranking:
  provider: cross_encoder
  fallback_provider: heuristic
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  batch_size: 8
  top_k: 5
  candidate_limit: 10
  normalize_scores: true

context:
  max_context_tokens: 700
  max_chunks: 4
  min_rerank_score: 0.1
  per_chunk_token_limit: 180
  deduplicate_by_document: true
  deduplicate_by_text: true
  compression_strategy: extractive
  include_metadata_headers: true

generation:
  provider: openai
  fallback_provider: heuristic
  temperature: 0.0
  max_output_tokens: 400
  max_citations: 4

postprocessing:
  high_confidence_threshold: 0.8
  medium_confidence_threshold: 0.55
  target_citation_count: 3
  target_context_blocks: 3
  citation_score_weight: 0.55
  citation_coverage_weight: 0.25
  context_coverage_weight: 0.20
  fallback_penalty: 0.12

cache:
  provider: memory
  redis_url: redis://redis:6379/0
  default_ttl_seconds: 300
  query_ttl_seconds: 180
  retrieval_ttl_seconds: 120
  embedding_ttl_seconds: 600

monitoring:
  enabled: true

latency:
  enable_adaptive_retrieval: true
  short_query_token_threshold: 4
  short_query_dense_top_k: 4
  short_query_sparse_top_k: 4
  short_query_candidate_pool_size: 6
  short_query_fused_top_k: 6
  stream_chunk_size: 80
  stream_media_type: application/x-ndjson

scaling:
  max_concurrent_queries: 8
  acquire_timeout_seconds: 1.5
  worker_processes: 2
  replica_hint: 2
  enable_backpressure: true

resilience:
  retry_attempts: 2
  retry_backoff_seconds: 0.2
  dense_failure_threshold: 3
  sparse_failure_threshold: 3
  generation_failure_threshold: 3
  circuit_reset_seconds: 30.0
  allow_partial_retrieval: true

cost:
  skip_llm_for_high_confidence: true
  confidence_rerank_threshold: 0.82
  minimum_context_blocks_for_skip: 2
  max_generation_context_blocks: 3
  prefer_cached_answers: true

security:
  require_api_key: false
  api_keys: []
  prompt_injection_action: sanitize
  max_query_characters: 2000
  auth_header_name: x-api-key
